<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahad E-Ride</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <h2>🚖 Ahad E-Ride</h2>
</header>

<div class="container">

  <h1>🚖 Ahad E-Ride</h1>

  <p>Book your ride anytime, anywhere</p>

  <input type="text" id="pickup" placeholder="Pickup Location">

  <input type="text" id="drop" placeholder="Drop Location">

  <select id="vehicle">
    <option>Select Vehicle</option>
    <option>🏍️ Bike</option>
    <option>🛺 Auto</option>
    <option>🚗 Mini</option>
    <option>🚙 Sedan</option>
    <option>🚘 SUV</option>
  </select>

  <button onclick="startRide()">Book Ride</button>

</div>

<div class="login-box">

  <h2>Login</h2>

  <input
    type="text"
    id="mobile"
    placeholder="Enter 10 Digit Mobile Number"
    maxlength="10"
  >

  <button onclick="login()">Send OTP</button>

  <div id="recaptcha-container"></div>

  <br><br>

  <input
    type="text"
    id="otp"
    placeholder="Enter OTP"
  >

  <button onclick="verifyOTP()">Verify OTP</button>

</div>

<footer>
  <p>© 2026 Ahad E-Ride. All Rights Reserved.</p>
</footer>

<script type="module" src="script.js"></script>

</body>
</html>
