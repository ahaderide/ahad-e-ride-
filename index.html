<! DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahad E-Ride</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
<h2>🚖 Ahad E-Ride</h2>
    
</header>
<div class="container">
<h1>🚖 Ahad E-Ride</h1>
    <p>Book your ride anytime, anywhere</p>

    <input type="text" placeholder="Pickup Location">
    <input type="text" placeholder="Drop Location">
<select id="vehicle">
    <option>Select Vehicle</option>
    <option>🏍️ Bike</option>
    <option>🛺 Auto</option>
    <option>🚗 Mini</option>
    <option>🚙 Sedan</option>
    <option>🚘 SUV</option>
</select>

    <button onclick="startRide()">Book Ride</button>
</div>

<script src="script.js"></script>
<div class="login-box">
<h2>Login</h2>

<input type="text" id="mobile" placeholder="Enter Mobile Number">

<button onclick="login()">Login</button>
</div> 
    <footer>
  <p>© 2026 Ahad E-Ride. All Rights Reserved.</p>
</footer
</body>
</html>
